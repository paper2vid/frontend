services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    image: paper2video-frontend:latest
    container_name: paper2video_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    extra_hosts:
      - "host-gateway:host-gateway"
    environment:
      - VITE_API_URL=http://host-gateway:8000